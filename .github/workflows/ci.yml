name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Ruff (recovery gate)
        run: python scripts/ci_check.py ruff
      - name: Ruff format check
        run: python scripts/ci_check.py format-check
      - name: Pytest (recovery gate)
        run: python scripts/ci_check.py pytest
